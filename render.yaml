services:
  - type: web
    name: project-meghana
    env: node
    buildCommand: npm run render-build
    startCommand: npm start
    envVars:
      - key: MONGODB_URI
        sync: false   # Set this secret in the Render dashboard → Environment
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: /api
